<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>WebXR - Interlagos AR iOS (Kanji)</title>
    
    <!-- Bibliotecas usando o jsDelivr -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.2/three.js/build/ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #111; }
        
        #ui-container {
            position: absolute; top: 15px; left: 15px; background: rgba(0, 0, 0, 0.7);
            color: white; padding: 15px; border-radius: 10px; z-index: 100; pointer-events: none;
        }
        h3 { margin: 0 0 5px 0; font-size: 16px; color: #ffcc00; }
        .stat { font-size: 14px; font-weight: bold; }
        
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 30px; font-size: 18px; font-weight: bold; background: #ffcc00;
            color: black; border: none; border-radius: 10px; z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #debug-log {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            background: rgba(255, 0, 0, 0.8); color: white; padding: 10px;
            font-family: monospace; font-size: 12px; z-index: 999; display: none;
        }
    </style>
</head>
<body>

    <button id="start-btn">INICIAR CÂMERA</button>

    <div id="ui-container">
        <h3>🏆 AR Interlagos</h3>
        <div id="lap-counter" class="stat">Volta: 1 / 3</div>
        <div id="leaderboard" class="stat">Aguardando...</div>
    </div>

    <div id="debug-log">Log: Iniciado...</div>

    <script>
        // Capturador de Erros
        window.onerror = function(message, source, lineno, colno, error) {
            const debugLog = document.getElementById('debug-log');
            debugLog.style.display = 'block';
            debugLog.innerHTML += `<br>❌ ERRO: ${message} (Linha ${lineno})`;
        };

        function logToScreen(msg) {
            const debugLog = document.getElementById('debug-log');
            debugLog.style.display = 'block';
            debugLog.style.background = 'rgba(0,0,0,0.7)';
            debugLog.innerHTML = `Log: ${msg}`;
        }

        let scene, camera, renderer, clock, world, markerRoot;
        let arToolkitSource, arToolkitContext;
        let raceActive = false;
        let cars = [];
        let waypoints = [];
        const MAX_LAPS = 3;

        document.getElementById('start-btn').addEventListener('click', function() {
            if (typeof THREEx === 'undefined') {
                logToScreen("❌ ERRO FATAL: O arquivo AR.js não foi baixado. Tente recarregar a página (F5).");
                return;
            }

            this.style.display = 'none';
            logToScreen("Configurando Cena 3D...");
            init();
        });

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.Camera();
            scene.add(camera);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
            document.body.appendChild(renderer.domElement);
            
            clock = new THREE.Clock();
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            logToScreen("Solicitando Câmera...");
            arToolkitSource = new THREEx.ArToolkitSource({ sourceType: 'webcam' });

            arToolkitSource.init(function ready() {
                logToScreen("Câmera Liberada!");
                let video = document.querySelector('video');
                if(video) {
                    video.setAttribute('playsinline', '');
                    video.muted = true;
                    video.play();
                }
                setTimeout(() => onResize(), 1000);
            }, function error(err) {
                logToScreen("❌ Permissão Negada ou Erro na Câmera.");
            });

            window.addEventListener('resize', onResize);

            arToolkitContext = new THREEx.ArToolkitContext({
                cameraParametersUrl: 'https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.2/data/data/camera_para.dat',
                detectionMode: 'mono'
            });

            arToolkitContext.init(function() {
                camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
            });

            markerRoot = new THREE.Group();
            scene.add(markerRoot);
            
            // ==========================================
            // AQUI ESTÁ A MUDANÇA PARA O MARCADOR KANJI
            // ==========================================
            new THREEx.ArMarkerControls(arToolkitContext, camera, {
                type: 'pattern', 
                patternUrl: 'https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.2/data/data/patt.kanji',
                changeMatrixMode: 'modelViewMatrix'
            });

            logToScreen("Construindo Pista...");
            world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
            
            const groundBody = new CANNON.Body({ type: CANNON.Body.STATIC, shape: new CANNON.Plane() });
            groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
            world.addBody(groundBody);

            buildTrack();
            spawnObstacles();
            spawnCars();

            logToScreen("Tudo Pronto! Aponte para o Marcador Kanji.");
            setTimeout(() => { document.getElementById('debug-log').style.display = 'none'; }, 4000);

            raceActive = true;
            animate();
        }

        function onResize() {
            arToolkitSource.onResizeElement();
            arToolkitSource.copyElementSizeTo(renderer.domElement);
            if (arToolkitContext.arController !== null) {
                arToolkitSource.copyElementSizeTo(arToolkitContext.arController.canvas);
            }
        }

        function buildTrack() {
            const trackPoints = [
                new THREE.Vector3(0, 0, 1), new THREE.Vector3(-0.5, 0, 0.8), new THREE.Vector3(-0.8, 0, 0.2),
                new THREE.Vector3(-0.6, 0, -0.6), new THREE.Vector3(-0.2, 0, -1.0), new THREE.Vector3(0.6, 0, -1.0),
                new THREE.Vector3(0.9, 0, -0.4), new THREE.Vector3(0.6, 0, 0.2), new THREE.Vector3(0.8, 0, 0.8),
                new THREE.Vector3(0.4, 0, 1.0)
            ];
            waypoints = trackPoints.map(p => new CANNON.Vec3(p.x, p.y, p.z));

            const path = new THREE.CatmullRomCurve3(trackPoints, true);
            const tubeGeom = new THREE.TubeGeometry(path, 64, 0.15, 8, true);
            const asphaltMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
            const trackMesh = new THREE.Mesh(tubeGeom, asphaltMat);
            markerRoot.add(trackMesh);
        }

        function spawnCars() {
            const carSpecs = [
                { color: 0xff0000, name: 'Vermelho', offset: -0.1 },
                { color: 0x0000ff, name: 'Azul', offset: 0 },
                { color: 0x00ff00, name: 'Verde', offset: 0.1 }
            ];

            carSpecs.forEach((spec) => {
                const geom = new THREE.BoxGeometry(0.08, 0.06, 0.16);
                const mat = new THREE.MeshLambertMaterial({ color: spec.color });
                const mesh = new THREE.Mesh(geom, mat);
                markerRoot.add(mesh);

                const shape = new CANNON.Box(new CANNON.Vec3(0.04, 0.03, 0.08));
                const body = new CANNON.Body({ mass: 1, shape: shape });
                body.position.set(spec.offset, 0.2, 1);
                body.angularFactor.set(0, 1, 0); 
                body.linearDamping = 0.6;
                world.addBody(body);

                cars.push({ mesh, body, name: spec.name, colorHex: spec.color, currentWaypoint: 1, laps: 0, baseForce: 2.5, speedVariation: Math.random() * 1.5 });
            });
        }

        function spawnObstacles() {
            const geom = new THREE.SphereGeometry(0.05, 16, 16);
            const mat = new THREE.MeshLambertMaterial({ color: 0xffa500 });
            [2, 4, 5, 7, 8].forEach(idx => {
                const mesh = new THREE.Mesh(geom, mat);
                mesh.position.set(waypoints[idx].x + ((Math.random() - 0.5)*0.15), 0.05, waypoints[idx].z + ((Math.random() - 0.5)*0.15));
                markerRoot.add(mesh);
                const shape = new CANNON.Sphere(0.05);
                const body = new CANNON.Body({ mass: 0, shape: shape });
                body.position.copy(mesh.position);
                world.addBody(body);
            });
        }

        function updatePhysics() {
            if (!raceActive) return;
            world.step(1 / 60, clock.getDelta(), 3);
            let leader = cars[0];
            let maxScore = -1;

            cars.forEach((car) => {
                car.mesh.position.copy(car.body.position);
                car.mesh.quaternion.copy(car.body.quaternion);

                let target = waypoints[car.currentWaypoint];
                let direction = new CANNON.Vec3(target.x - car.body.position.x, 0, target.z - car.body.position.z);
                let distance = direction.length();
                direction.normalize();

                let totalForce = car.baseForce + car.speedVariation;
                car.body.applyForce(new CANNON.Vec3(direction.x * totalForce, 0, direction.z * totalForce), car.body.position);
                car.mesh.lookAt(target.x, car.mesh.position.y, target.z);

                if (distance < 0.25) {
                    car.currentWaypoint++;
                    if (car.currentWaypoint >= waypoints.length) {
                        car.currentWaypoint = 0;
                        car.laps++;
                        car.speedVariation = Math.random() * 1.5; 
                        
                        if (car.laps >= MAX_LAPS) {
                            raceActive = false;
                            document.getElementById('leaderboard').innerText = `🏆 CAMPEÃO: ${car.name.toUpperCase()}!`;
                            document.getElementById('leaderboard').style.color = '#' + car.colorHex.toString(16).padStart(6, '0');
                            cars.forEach(c => c.body.velocity.set(0,0,0));
                            return;
                        }
                    }
                }
                let score = (car.laps * 100) + car.currentWaypoint;
                if (score > maxScore) { maxScore = score; leader = car; }
            });

            if (raceActive) {
                document.getElementById('lap-counter').innerText = `Volta: ${Math.min(leader.laps + 1, MAX_LAPS)} / ${MAX_LAPS}`;
                document.getElementById('leaderboard').innerText = `Líder: ${leader.name}`;
                document.getElementById('leaderboard').style.color = '#' + leader.colorHex.toString(16).padStart(6, '0');
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (arToolkitSource && arToolkitSource.ready !== false) {
                arToolkitContext.update(arToolkitSource.domElement);
            }
            updatePhysics();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
